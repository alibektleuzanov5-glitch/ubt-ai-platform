<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ҰБТ Математика - AI Платформа</title>
    <style>
        /* Қарапайым дизайн: формаларды әдемі көрсету үшін */
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #27ae60; }
        .toggle-link { color: #3498db; cursor: pointer; text-align: center; margin-top: 15px; display: block; }
        #chatBox { height: 300px; border: 1px solid #ddd; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #fff; }
        .hidden { display: none; }
        .course-card { border: 1px solid #eee; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="pageTitle" style="text-align: center;">Қош келдіңіз!</h2>
    <p id="userInfo" style="text-align: center; font-weight: bold; color: #2c3e50;"></p>

    <div id="loginForm">
        <h3>Жүйеге кіру</h3>
        <input type="email" id="loginEmail" placeholder="Электронды пошта (Email)">
        <input type="password" id="loginPass" placeholder="Құпия сөз">
        <button onclick="login()">Кіру</button>
        <span class="toggle-link" onclick="toggleForms()">Аккаунтыңыз жоқ па? Тіркелу</span>
    </div>

    <div id="regForm" class="hidden">
        <h3>Жаңа аккаунт ашу</h3>
        <input type="text" id="regName" placeholder="Толық атыңыз">
        <input type="email" id="regEmail" placeholder="Электронды пошта (Email)">
        <input type="password" id="regPass" placeholder="Құпия сөз">
        <button onclick="register()">Тіркелуді аяқтау</button>
        <span class="toggle-link" onclick="toggleForms()">Аккаунтыңыз бар ма? Кіру</span>
    </div>

    <div id="mainContent" class="hidden">
        <hr>
        <h3>Математика курстары</h3>
        <div id="coursesContainer">Курстар жүктелуде...</div>

        <hr>
        <h3>ЖИ Мұғаліммен сөйлесу</h3>
        <div id="chatBox"></div>
        <input type="text" id="chatInput" placeholder="Сұрағыңызды жазыңыз...">
        <button onclick="sendChat()" style="background-color: #3498db;">Жіберу</button>
        <br><br>
        <button onclick="logout()" style="background-color: #e74c3c;">Шығу</button>
    </div>
</div>

<script src="app.js"></script>

<script>
    // Бұл жерде тек интерфейсті басқару функциясы қалады
    function toggleForms() {
        const loginForm = document.getElementById("loginForm");
        const regForm = document.getElementById("regForm");
        const pageTitle = document.getElementById("pageTitle");

        if (loginForm.classList.contains("hidden")) {
            loginForm.classList.remove("hidden");
            regForm.classList.add("hidden");
            pageTitle.innerText = "Жүйеге кіру";
        } else {
            loginForm.classList.add("hidden");
            regForm.classList.remove("hidden");
            pageTitle.innerText = "Тіркелу";
        }
    }

    function logout() {
        localStorage.clear();
        window.location.reload();
    }

    // Егер пайдаланушы бұрын кірген болса, форманы жасырып, контентті көрсету
    window.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem("token");
        if (token) {
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("regForm").classList.add("hidden");
            document.getElementById("mainContent").classList.remove("hidden");
        }
    });
</script>

</body>
</html>
