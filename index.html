<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT AI Platform | 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <div id="authContainer" class="auth-wrapper">
        <div class="auth-card">
            <h2 id="pageTitle">Жүйеге кіру</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPass" placeholder="Құпия сөз">
                <button onclick="login()" class="btn-primary">Кіру</button>
            </div>
            <div id="regForm" class="hidden">
                <input type="text" id="regName" placeholder="Толық атыңыз">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPass" placeholder="Құпия сөз">
                <button onclick="register()" class="btn-primary">Тіркелу</button>
            </div>
            <p onclick="toggleForms()" class="toggle-link">Аккаунт ауыстыру</p>
        </div>
    </div>

    <div id="mainContent" class="dashboard-wrapper hidden">
        
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🎓</span> <b>ENT</b>prep AI
            </div>
            <nav class="nav-menu">
                <a href="#" class="active">🏠 Басты бет</a>
                <a href="#">📚 Менің курстарым</a>
                <a href="#" onclick="showLeaderboard()">🏆 Рейтинг</a>
                <a href="#">📝 Сынақ тестері</a>
                <a href="#" onclick="logout()" class="logout-link">🚪 Шығу</a>
            </nav>
        </aside>

        <main class="main-body">
            <header class="top-bar">
                <div id="userInfo" class="user-info">Жүктелуде...</div>
            </header>

            <div class="content-grid">
                <section class="courses-section">
                    <h3>🚀 Менің курстарым</h3>
                    <div id="coursesContainer" class="courses-grid">
                        <p class="loading-text">Курстар жүктелуде...</p>
                    </div>
                </section>

                <section class="ai-section">
                    <div class="ai-header">
                        <h3>🤖 ЖИ Мұғалім</h3>
                        <button onclick="analyzeMistakes()" class="btn-secondary">🔍 Қатемен жұмыс</button>
                    </div>
                    <div id="chatBox" class="chat-window">
                        <div class="bot-msg">Сәлем! Бүгін қай тақырыпты талдаймыз? Сұрақ жаз немесе есептің суретін жібер.</div>
                    </div>
                    <div class="chat-input-area">
                        <label for="imageInput" class="img-btn">📷
                            <input type="file" id="imageInput" accept="image/*" hidden>
                        </label>
                        <input type="text" id="chatInput" placeholder="Сұрақ жазыңыз...">
                        <button onclick="sendChat()" class="btn-send">Жіберу</button>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
