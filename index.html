<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>AXIOM AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-section" class="auth-container">
        <div class="auth-box">
            <h1>🚀 AXIOM AI</h1>
            <input type="text" id="reg-name" placeholder="Аты-жөніңіз">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Құпия сөз">
            <button onclick="login()">Кіру</button>
            <button onclick="register()">Тіркелу</button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <aside class="sidebar">
            <h2>Axiom AI</h2>
            <nav class="menu">
                <a href="#" onclick="show('dashboard-section')">🏠 Чат</a>
                <a href="#" onclick="show('courses-section')">📚 Курстар</a>
                <a href="#" onclick="show('simulator-section')">📊 Симулятор</a>
                <a href="#" onclick="show('league-section')">🏆 Лига</a>
                <a href="#" onclick="show('errors-section')">🧠 Қателер</a>
                <a href="#" onclick="show('store-section')">🛒 Профиль</a>
            </nav>
            <button onclick="logout()" style="background:#ef4444; margin-top:20px;">Шығу</button>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div><img id="header-avatar" src="" width="40" style="border-radius:50%; vertical-align:middle; margin-right:10px;"><span id="user-greeting"></span></div>
                <div class="stats">XP: <span id="user-xp" style="color:#fbbf24; font-weight:bold;"></span> | <span id="user-league" style="color:#a78bfa; font-weight:bold;"></span></div>
            </header>

            <div id="dashboard-section" class="section">
                <div id="chat-box"></div>
                <div style="display:flex; gap:10px;">
                    <input id="chat-input" style="flex-grow:1; padding:10px; border-radius:5px; border:none; background:#1e293b; color:white;" placeholder="ЖИ мұғалімге сұрақ қойыңыз...">
                    <button onclick="sendMsg()" style="width:auto; padding:10px 20px;">Жіберу</button>
                </div>
            </div>
            
            <div id="courses-section" class="section" style="display:none;">
                <h2>📚 Курстар мен Тақырыптар</h2>
                <div id="courses-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;"></div>
            </div>

            <div id="simulator-section" class="section" style="display:none;">
                <h2>📊 ҰБТ Симуляторы</h2>
                <div id="sim-start"><button onclick="startSim()" style="margin-top:15px;">Тестті бастау</button></div>
                <div id="sim-test" style="display:none; background:#1e293b; padding:20px; border-radius:10px; margin-top:15px;">
                    <h3 id="sim-q" style="margin-bottom:15px;"></h3><div id="sim-opts"></div>
                </div>
                <div id="sim-res" style="display:none; background:#1e293b; padding:20px; border-radius:10px; margin-top:15px;">
                    <h3>Нәтиже: <span id="sim-score" style="color:#4ade80;"></span> дұрыс</h3>
                    <p id="sim-ai" style="margin-top:15px; line-height:1.5;"></p>
                </div>
            </div>

            <div id="league-section" class="section" style="display:none;">
                <h2 id="league-title" style="margin-bottom:15px; color:#fbbf24;"></h2>
                <table id="leaderboard"></table>
            </div>

            <div id="errors-section" class="section" style="display:none;">
                <h2>🧠 Қателер дәптері</h2>
                <div id="errors-container" style="display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px;"></div>
            </div>
            
            <div id="store-section" class="section" style="display:none;">
                <button onclick="getParentCode()" style="background:#10b981; color:white; padding:10px; margin-bottom:20px; width:auto;">Ата-ана кодын алу (Telegram)</button>
                <p id="parent-code-display" style="font-size:1.5rem;font-weight:bold;color:#3b82f6;"></p>
                <div id="store-container" style="display:flex; gap:20px; margin-top:20px; flex-wrap:wrap;"></div>
            </div>
        </main>
    </div>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="app.js"></script>
</body>
</html>
