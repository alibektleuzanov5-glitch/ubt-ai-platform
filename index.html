<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>AXIOM AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-section" class="auth-container">
        <div class="auth-box">
            <h1>🚀 AXIOM AI</h1>
            <input type="text" id="reg-name" placeholder="Аты-жөніңіз">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Құпия сөз">
            <button onclick="login()">Кіру</button>
            <button onclick="register()">Тіркелу</button>
        </div>
    </div>

    <div id="main-app" style="display: none;">
        <aside class="sidebar">
            <h2>Axiom AI</h2>
            <nav class="menu">
                <a href="#" onclick="show('dashboard-section')">🏠 Чат</a>
                <a href="#" onclick="show('simulator-section')">📊 Симулятор</a>
                <a href="#" onclick="show('league-section')">🏆 Лига</a>
                <a href="#" onclick="show('errors-section')">🧠 Қателер</a>
                <a href="#" onclick="show('store-section')">🛒 Профиль</a>
            </nav>
            <button onclick="logout()">Шығу</button>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div><img id="header-avatar" src="" width="40"><span id="user-greeting"></span></div>
                <div class="stats">XP: <span id="user-xp"></span> | <span id="user-league"></span></div>
            </header>

            <div id="dashboard-section" class="section"><div id="chat-box"></div><input id="chat-input"><button onclick="sendMsg()">Жіберу</button></div>
            
            <div id="simulator-section" class="section" style="display:none;">
                <div id="sim-start"><button onclick="startSim()">Тестті бастау</button></div>
                <div id="sim-test" style="display:none;"><h3 id="sim-q"></h3><div id="sim-opts"></div></div>
                <div id="sim-res" style="display:none;"><h3 id="sim-score"></h3><p id="sim-ai"></p></div>
            </div>

            <div id="league-section" class="section" style="display:none;">
                <h2 id="league-title"></h2><table id="leaderboard"></table>
            </div>

            <div id="errors-section" class="section" style="display:none;"><div id="errors-container"></div></div>
            
            <div id="store-section" class="section" style="display:none;">
                <button onclick="getParentCode()" style="background:green;color:white;padding:10px;margin-bottom:20px;">Ата-ана кодын алу (Telegram)</button>
                <p id="parent-code-display" style="font-size:1.5rem;font-weight:bold;color:#3b82f6;"></p>
                <div id="store-container" style="display:flex;gap:20px;"></div>
            </div>
        </main>
    </div>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="app.js"></script>
</body>
</html>
